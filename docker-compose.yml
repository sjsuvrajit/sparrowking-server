version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: sparrowking_postgres
    restart: always
    environment:
      POSTGRES_USER: sparrow
      POSTGRES_PASSWORD: sparrow123
      POSTGRES_DB: sparrowking_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sparrow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache 
  redis:
    image: redis:7-alpine
    container_name: sparrowking_redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: